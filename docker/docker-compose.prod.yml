version: "3.9"

services:
  backend:
    build:
      context: ../backend
      target: prod
    restart: always
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 1g

  worker:
    build:
      context: ../backend
      target: prod
    restart: always
    command: celery -A app.tasks.celery_app worker -l INFO -Q default,emails,payments --concurrency=4

  beat:
    build:
      context: ../backend
      target: prod
    restart: always
    command: celery -A app.tasks.celery_app beat -l INFO

  frontend:
    build:
      context: ../frontend
      target: prod
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 512m
