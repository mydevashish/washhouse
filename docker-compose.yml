version: "3.9"

# =============================================================================
# Doorstep Laundry Marketplace — Local Development Stack
# =============================================================================
# Usage:
#   docker compose up -d --build
#   docker compose logs -f backend
#   docker compose down -v
# =============================================================================

name: dlm

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: dlm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dlm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dlm_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dlm_db}
    ports:
      - "5432:5432"
    volumes:
      - dlm_pg_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dlm} -d ${POSTGRES_DB:-dlm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm-net

  # ---------------------------------------------------------------------------
  # Redis — cache + Celery broker / result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dlm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - dlm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm-net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI service
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: dlm-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dlm}:${POSTGRES_PASSWORD:-dlm_dev_password}@db:5432/${POSTGRES_DB:-dlm_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - dlm-net

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: dlm-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dlm}:${POSTGRES_PASSWORD:-dlm_dev_password}@db:5432/${POSTGRES_DB:-dlm_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info
    networks:
      - dlm-net

  # ---------------------------------------------------------------------------
  # Celery beat (scheduled tasks)
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: dlm-beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dlm}:${POSTGRES_PASSWORD:-dlm_dev_password}@db:5432/${POSTGRES_DB:-dlm_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      worker:
        condition: service_started
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - dlm-net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: dlm-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - dlm-net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  dlm-net:
    driver: bridge

volumes:
  dlm_pg_data:
    driver: local
  dlm_redis_data:
    driver: local
