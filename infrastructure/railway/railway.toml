[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --proxy-headers --forwarded-allow-ips=*"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.envs.production]
APP_ENV = "production"
LOG_LEVEL = "INFO"

[deploy.envs.staging]
APP_ENV = "staging"
LOG_LEVEL = "DEBUG"
