name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint-type-test:
    name: Lint · Type · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dlm
          POSTGRES_PASSWORD: dlm
          POSTGRES_DB: dlm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U dlm"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://dlm:dlm@localhost:5432/dlm_test
      DATABASE_URL_DIRECT: postgresql://dlm:dlm@localhost:5432/dlm_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_PRIVATE_KEY: "test-private"
      JWT_PUBLIC_KEY: "test-public"
      JWT_ALG: HS256
      JWT_SECRET: "test-secret"
      CORS_ALLOW_ORIGINS: "*"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Mypy (type-check)
        run: mypy app

      - name: Alembic migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest --cov=app --cov-report=xml --cov-report=term --maxfail=1 -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
